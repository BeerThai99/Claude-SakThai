name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate workflow files
        run: |
          for f in .github/workflows/*.yml; do
            echo "Checking $f"
            python3 -c "import yaml, sys; yaml.safe_load(open('$f'))" && echo "  OK" || { echo "  INVALID YAML"; exit 1; }
          done

      - name: Check required files
        run: |
          [ -f .claude/skills/stop-slop/SKILL.md ] || { echo "Missing SKILL.md"; exit 1; }
          [ -f .claude/settings.json ] || { echo "Missing settings.json"; exit 1; }
          [ -x .claude/hooks/session-start.sh ] || { echo "session-start.sh missing or not executable"; exit 1; }
          echo "All required files present"

      - name: Validate skills-lock.json matches installed skills
        run: |
          python3 - <<'EOF'
          import json, os, sys
          lock = json.load(open("skills-lock.json"))
          skills_dir = ".claude/skills"
          locked = set(lock["skills"].keys())
          installed = set(os.listdir(skills_dir))
          missing = locked - installed
          extra = installed - locked
          ok = True
          if missing:
              print(f"In lock but not installed: {sorted(missing)}")
              ok = False
          if extra:
              print(f"Installed but not in lock: {sorted(extra)}")
              ok = False
          if ok:
              print(f"skills-lock.json and .claude/skills/ are in sync ({len(locked)} skills)")
          sys.exit(0 if ok else 1)
          EOF
