name: Handle access request

on:
  issues:
    types: [opened, reopened]

permissions:
  issues: write

jobs:
  acknowledge:
    if: contains(github.event.issue.labels.*.name, 'access-request')
    runs-on: ubuntu-latest
    steps:
      - name: Post acknowledgement comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: [
                "Thanks for requesting preview access.",
                "",
                "@BeerThai99 will review this and add you to the preview environment if approved.",
                "You will be notified on this issue once access is granted or declined.",
              ].join("\n"),
            });
