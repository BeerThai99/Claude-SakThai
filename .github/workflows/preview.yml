name: Preview

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  preview:
    name: Preview validation
    environment: preview
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Summarise changes
        run: |
          echo "## Files changed" >> $GITHUB_STEP_SUMMARY
          git diff --name-status origin/${{ github.base_ref }}...HEAD >> $GITHUB_STEP_SUMMARY || \
            git diff --name-status HEAD~1...HEAD >> $GITHUB_STEP_SUMMARY

      - name: Validate config integrity
        run: |
          python3 -c "import json; json.load(open('.claude/settings.json'))" \
            && echo "settings.json: valid JSON" \
            || { echo "settings.json: invalid JSON"; exit 1; }

          python3 -c "import json; json.load(open('skills-lock.json'))" \
            && echo "skills-lock.json: valid JSON" \
            || { echo "skills-lock.json: invalid JSON"; exit 1; }

          [ -x .claude/hooks/session-start.sh ] \
            && echo "session-start.sh: executable" \
            || { echo "session-start.sh: not executable"; exit 1; }

      - name: Dry-run session hook
        run: |
          output=$(CLAUDE_CODE_REMOTE=true bash .claude/hooks/session-start.sh)
          echo "Hook output: $output"
